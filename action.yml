name: Setup arctl
description: Install and verify the arctl CLI from agentregistry-dev/agentregistry releases

branding:
  icon: package
  color: blue

inputs:
  version:
    description: arctl version to install (without leading v)
    required: false
    default: '0.3.3'
  install-dir:
    description: Directory to install arctl into
    required: false
    default: /usr/local/bin

runs:
  using: composite
  steps:
    - name: Download arctl binary and verify checksum
      shell: bash
      env:
        ARCTL_VERSION: ${{ inputs.version }}
        INSTALL_DIR: ${{ inputs.install-dir }}
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        [ "$ARCH" = "aarch64" ] && ARCH="arm64"
        [ "$ARCH" = "x86_64" ]  && ARCH="amd64"
        BINARY="arctl-${OS}-${ARCH}"

        echo "Downloading ${BINARY} v${ARCTL_VERSION}..."
        curl -sSL \
          "https://github.com/agentregistry-dev/agentregistry/releases/download/v${ARCTL_VERSION}/${BINARY}" \
          -o /tmp/arctl

        echo "Verifying checksum..."
        EXPECTED=$(curl -sSL \
          "https://github.com/agentregistry-dev/agentregistry/releases/download/v${ARCTL_VERSION}/${BINARY}.sha256" \
          | awk '{print $1}')
        if [ -z "$EXPECTED" ]; then
          echo "Error: could not fetch checksum for ${BINARY}"
          exit 1
        fi
        echo "${EXPECTED}  /tmp/arctl" | sha256sum --check --strict
        echo "Checksum verified for ${BINARY}"

        chmod +x /tmp/arctl
        mv /tmp/arctl "${INSTALL_DIR}/arctl"
        echo "arctl ${ARCTL_VERSION} installed to ${INSTALL_DIR}/arctl"
        arctl version
